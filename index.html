<script>
(function () {
  'use strict';

  var TIME_PER_Q = 10000;
  var RING_R = 42;
  var RING_C = 2 * Math.PI * RING_R;

  var CATEGORIES = [
    { id: 'general', name: 'ความรู้ทั่วไป', icon: '🧠', locked: false },
    { id: 'sports', name: 'กีฬา', icon: '⚽', locked: false },
    { id: 'entertainment', name: 'บันเทิง', icon: '🎬', locked: false },
    { id: 'science', name: 'วิทยาศาสตร์', icon: '🔬', locked: false },
    { id: 'history', name: 'ประวัติศาสตร์', icon: '🏛️', locked: false },
    { id: 'geography', name: 'ภูมิศาสตร์', icon: '🌍', locked: false },
    { id: 'nature', name: 'ธรรมชาติ & สัตว์', icon: '🐾', locked: false },
    { id: 'math', name: 'คณิต & ตรรกะ', icon: '🔢', locked: false },
    { id: 'food', name: 'อาหาร & เครื่องดื่ม', icon: '🍜', locked: false },
    { id: 'thaiculture', name: 'วัฒนธรรมไทย', icon: '🏯', locked: false },
    { id: 'anime', name: 'การ์ตูน & อนิเมะ', icon: '🎌', locked: false },
    { id: 'tech', name: 'เทคโนโลยี & ไอที', icon: '💻', locked: false },
  ];

  // นิยามเหรียญตรา — check(store, ctx) คืน boolean; store = ข้อมูลสะสม, ctx = เกมที่เพิ่งจบ
  // ctx = { mode, score, correct, total, avgSec }
  var ACHIEVEMENTS = [
    // เล่น & สะสม
    { id: 'first_game', icon: '🎮', name: 'เล่นเกมแรก', desc: 'เล่นจบเกมแรกของคุณ', group: 'เล่น & สะสม', check: function (s) { return (s.stats && s.stats.gamesPlayed || 0) >= 1; } },
    { id: 'games_10', icon: '🏅', name: 'นักเล่นตัวยง', desc: 'เล่นครบ 10 เกม', group: 'เล่น & สะสม', check: function (s) { return (s.stats && s.stats.gamesPlayed || 0) >= 10; } },
    { id: 'games_50', icon: '🎖️', name: 'ขาประจำ', desc: 'เล่นครบ 50 เกม', group: 'เล่น & สะสม', check: function (s) { return (s.stats && s.stats.gamesPlayed || 0) >= 50; } },
    { id: 'correct_100', icon: '✅', name: 'รู้รอบตัว', desc: 'ตอบถูกสะสม 100 ข้อ', group: 'เล่น & สะสม', check: function (s) { return (s.stats && s.stats.totalCorrect || 0) >= 100; } },
    // ความเก่ง
    { id: 'perfect_game', icon: '💯', name: 'เพอร์เฟกต์', desc: 'ตอบถูกทุกข้อในหนึ่งเกม', group: 'ความเก่ง', check: function (s, c) { return c && c.total > 0 && c.correct === c.total; } },
    { id: 'speed_demon', icon: '⚡', name: 'ตอบไว', desc: 'เฉลี่ยตอบเร็วกว่า 3 วิ/ข้อ', group: 'ความเก่ง', check: function (s, c) { return c && c.avgSec > 0 && c.avgSec < 3 && c.correct >= Math.ceil(c.total * 0.6); } },
    { id: 'high_scorer', icon: '🌟', name: 'มือทอง', desc: 'ทำคะแนนถึง 1800 ในเกมเดียว', group: 'ความเก่ง', check: function (s, c) { return c && c.score >= 1800; } },
    // สตรีค & ประจำวัน
    { id: 'daily_first', icon: '📅', name: 'เริ่มวินัย', desc: 'เล่นชาเลนจ์ประจำวันจบครั้งแรก', group: 'สตรีค & ประจำวัน', check: function (s) { return !!(s.daily && s.daily.lastCompletedDate); } },
    { id: 'streak_7', icon: '🔥', name: 'หนึ่งสัปดาห์', desc: 'สตรีคต่อเนื่อง 7 วัน', group: 'สตรีค & ประจำวัน', check: function (s) { return (s.streak && s.streak.best || 0) >= 7; } },
    { id: 'streak_30', icon: '🗓️', name: 'หนึ่งเดือน', desc: 'สตรีคต่อเนื่อง 30 วัน', group: 'สตรีค & ประจำวัน', check: function (s) { return (s.streak && s.streak.best || 0) >= 30; } },
  ];

  // จำนวนคำถามต่อหนึ่งเกม (สุ่มจากคลังของหมวดที่เลือก)
  var QUESTIONS_PER_GAME = 10;

  // คลังคำถามโหลดจาก data/questions.<category>.js ผ่าน <script src> (ดู ADR-001)
  function questionBank(catId) {
    var d = window.QUIZ_DATA || {};
    return (d[catId] && d[catId].questions) || [];
  }

  var PALETTE = { idleBg: '#ffffff', idleText: '#3d2c52', selectedBg: '#ffd6ea', selectedText: '#d6408f', correctBg: '#34d399', correctText: '#ffffff', wrongBg: '#f87171', wrongText: '#ffffff', dimBg: '#f4f1fa', dimText: '#c3b8d6' };

  function createInitialGameState() {
    return {
      screen: 'start',
      mode: 'normal',
      category: 'general',
      deck: [],
      qIndex: 0,
      score: 0,
      correctCount: 0,
      answers: [],
      timeLeft: TIME_PER_Q,
      selected: null,
      locked: false,
      lastGained: null,
      qEnter: true,
      reviewOpen: false,
      toastMsg: '',
      challengeSeed: null,
      challengeTarget: null,
      challengeBy: '',
      lbSubmitted: false,
      lbSubmitting: false,
      lbLoading: false,
      lbEntries: [],
      lbError: '',
      newAchievements: [],
    };
  }

  var state = createInitialGameState();
  var timer = null;
  var advanceTimeout = null;

  function setState(patch) {
    Object.assign(state, typeof patch === 'function' ? patch(state) : patch);
    render();
  }

  function clearTimer() {
    if (timer) { clearInterval(timer); timer = null; }
    if (advanceTimeout) { clearTimeout(advanceTimeout); advanceTimeout = null; }
  }

  function computeScore(timeLeft) {
    var ratio = Math.max(0, Math.min(1, timeLeft / TIME_PER_Q));
    return Math.round(100 + 100 * ratio);
  }

  // ---- Persistent storage (localStorage) + date helpers ----
  var LS_KEY = 'quizdash.v1';
  function loadStore() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch (e) { return {}; } }
  function saveStore(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch (e) {} }

  // Leaderboard adapter — provider เลือกอัตโนมัติ: มี config Supabase = 'supabase', ไม่มี = 'local' (localStorage)
  // interface เป็น Promise ทั้งคู่ → UI เดียวกัน (ดู LEADERBOARD-SETUP.md)
  var LB_KEY = 'quizdash.lb';
  var Leaderboard = (function () {
    var cfg = window.QUIZDASH_CONFIG || {};
    var useSupabase = !!(cfg.supabaseUrl && cfg.supabaseKey);
    function localTop(limit) { try { return Promise.resolve((JSON.parse(localStorage.getItem(LB_KEY)) || []).slice(0, limit)); } catch (e) { return Promise.resolve([]); } }
    function localSubmit(e) {
      try {
        var a = JSON.parse(localStorage.getItem(LB_KEY)) || [];
        a.push(e); a.sort(function (x, y) { return y.score - x.score; });
        localStorage.setItem(LB_KEY, JSON.stringify(a.slice(0, 100)));
      } catch (_) {}
      return Promise.resolve();
    }
    function sbHeaders() { return { apikey: cfg.supabaseKey, Authorization: 'Bearer ' + cfg.supabaseKey, 'Content-Type': 'application/json' }; }
    function sbTop(limit) {
      return fetch(cfg.supabaseUrl + '/rest/v1/scores?select=name,score,mode,category,created_at&order=score.desc&limit=' + limit, { headers: sbHeaders() })
        .then(function (r) { if (!r.ok) throw 0; return r.json(); });
    }
    function sbSubmit(e) {
      return fetch(cfg.supabaseUrl + '/rest/v1/scores', { method: 'POST', headers: Object.assign(sbHeaders(), { Prefer: 'return=minimal' }), body: JSON.stringify(e) })
        .then(function (r) { if (!r.ok) throw 0; });
    }
    return { mode: useSupabase ? 'supabase' : 'local', top: useSupabase ? sbTop : localTop, submit: useSupabase ? sbSubmit : localSubmit };
  })();

  // Analytics adapter — มี posthogKey = ส่งเข้า PostHog, ไม่มี = โหมด console (ตั้ง window.__ANALYTICS_DEBUG=true เพื่อดู log)
  // ไม่ส่ง PII (ชื่อผู้เล่น) เข้า analytics เด็ดขาด — ส่งแค่ event + ค่าที่ไม่ระบุตัวตน (ดู ANALYTICS-SETUP.md)
  var Analytics = (function () {
    var cfg = window.QUIZDASH_CONFIG || {};
    var key = cfg.posthogKey;
    var host = (cfg.posthogHost || 'https://us.i.posthog.com').replace(/\/$/, '');
    var ready = false, ph = null, queue = [];
    if (key) {
      var assets = host.replace('.i.posthog.com', '-assets.i.posthog.com');
      var s = document.createElement('script');
      s.src = assets + '/static/array.js';
      s.async = true;
      s.onload = function () {
        try {
          window.posthog.init(key, { api_host: host, capture_pageview: false, autocapture: false, persistence: 'localStorage' });
          ph = window.posthog; ready = true;
          queue.forEach(function (e) { try { ph.capture(e.n, e.p); } catch (_) {} });
          queue = [];
        } catch (_) {}
      };
      s.onerror = function () {};
      document.head.appendChild(s);
    }
    function track(name, props) {
      if (key) {
        if (ready && ph) { try { ph.capture(name, props || {}); } catch (_) {} }
        else { queue.push({ n: name, p: props || {} }); if (queue.length > 100) queue.shift(); }
      } else if (window.__ANALYTICS_DEBUG) {
        console.log('[analytics]', name, props || {});
      }
    }
    return { track: track, mode: key ? 'posthog' : 'console' };
  })();
  function track(name, props) { Analytics.track(name, props); }

  function dateStr(d) { d = d || new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  function prevDateStr() { var d = new Date(); d.setDate(d.getDate() - 1); return dateStr(d); }

  // คำท้าที่มากับ URL (?ch=seed&s=score&by=name) — อ่านครั้งเดียวตอนโหลด
  var pendingChallenge = null;
  (function () {
    try {
      var p = new URLSearchParams(location.search), ch = p.get('ch');
      if (ch) pendingChallenge = { seed: ch, target: p.get('s') ? parseInt(p.get('s'), 10) : null, by: p.get('by') ? decodeURIComponent(p.get('by')) : '' };
    } catch (e) {}
  })();

  function showToast(msg) {
    setState({ toastMsg: msg });
    setTimeout(function () { setState({ toastMsg: '' }); }, 2000);
  }

  // Seeded PRNG (xfnv1a hash → mulberry32) — deck ของ seed เดียวกันจะ identical ทุกเครื่อง
  function makeRng(seedStr) {
    var h = 1779033703 ^ seedStr.length;
    for (var i = 0; i < seedStr.length; i++) { h = Math.imul(h ^ seedStr.charCodeAt(i), 3432918353); h = h << 13 | h >>> 19; }
    var a = h >>> 0;
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // Fisher–Yates shuffle (คืนอาร์เรย์ใหม่ ไม่แก้ของเดิม) — rng ไม่ระบุ = Math.random (สุ่มปกติ)
  function shuffle(arr, rng) {
    rng = rng || Math.random;
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // รวมคำถามจากทุกหมวด (ใช้กับ Daily Challenge)
  function allQuestions() {
    var out = [];
    CATEGORIES.forEach(function (c) { out = out.concat(questionBank(c.id)); });
    return out;
  }

  // สร้างชุดคำถามสำหรับหนึ่งเกม: สุ่มคำถาม + สลับลำดับตัวเลือกในแต่ละข้อ
  // (คำนวณ correct index ใหม่ตามตำแหน่งที่สลับแล้ว) — เก็บ id ติดไว้ใช้กับ daily challenge/สถิติ
  // rng ระบุ = โหมด daily (สุ่มรวมทุกหมวดแบบ seeded ให้เหมือนกันทุกเครื่อง), ไม่ระบุ = หมวดที่เลือก (สุ่มปกติ)
  function buildDeck(rng) {
    var bank = rng ? allQuestions() : questionBank(state.category);
    var picked = shuffle(bank, rng).slice(0, Math.min(QUESTIONS_PER_GAME, bank.length));
    return picked.map(function (q) {
      var correctText = q.options[q.correct];
      var options = shuffle(q.options, rng);
      return { id: q.id, text: q.text, options: options, correct: options.indexOf(correctText) };
    });
  }

  var audioCtx = null;
  function getAudioCtx() {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    if (!audioCtx) audioCtx = new AC();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, start, dur, type, vol) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
    gain.gain.setValueAtTime(vol || 0.15, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur);
  }

  function playSound(type) {
    try {
      if (type === 'correct') {
        playTone(523.25, 0, 0.18, 'sine', 0.2);
        playTone(783.99, 0.1, 0.25, 'sine', 0.2);
      } else if (type === 'wrong') {
        playTone(220, 0, 0.3, 'sawtooth', 0.15);
      } else if (type === 'click') {
        playTone(440, 0, 0.08, 'square', 0.08);
      } else if (type === 'tick') {
        playTone(880, 0, 0.05, 'sine', 0.06);
      } else if (type === 'win') {
        [523.25, 659.25, 783.99, 1046.5].forEach(function (f, i) { playTone(f, i * 0.12, 0.3, 'sine', 0.18); });
      }
    } catch (e) {}
  }

  // Surgically update only the countdown ring + number. A full render() on
  // every 100ms tick would rebuild #app's innerHTML 10x/sec, destroying the
  // option elements between a real click's mousedown and mouseup so the click
  // never fires. Keeping the option DOM stable during the countdown fixes that.
  function updateTimerDisplay() {
    var ring = document.getElementById('timer-ring');
    var num = document.getElementById('timer-num');
    if (!ring || !num) return;
    var dashOffset = RING_C * (1 - state.timeLeft / TIME_PER_Q);
    var timeLeftSec = Math.ceil(state.timeLeft / 1000);
    ring.setAttribute('stroke-dashoffset', dashOffset);
    num.textContent = timeLeftSec;
    var urgent = !state.locked && timeLeftSec <= 3;
    num.style.animation = urgent ? 'urgentPulse 0.6s ease-in-out infinite' : 'none';
  }

  function startTimer() {
    clearTimer();
    timer = setInterval(function () {
      if (state.locked) return;
      var prevSec = Math.ceil(state.timeLeft / 1000);
      var nt = Math.max(0, state.timeLeft - 100);
      var nextSec = Math.ceil(nt / 1000);
      if (nextSec !== prevSec && nt > 0 && nt <= 3000) playSound('tick');
      state.timeLeft = nt;
      if (nt <= 0) {
        clearInterval(timer);
        timer = null;
        handleAnswer(null);
      } else {
        updateTimerDisplay();
      }
    }, 100);
  }

  function startGame() {
    if (!questionBank(state.category).length) return; // ไฟล์ข้อมูลโหลดไม่ติด — อย่าเข้าเกมด้วย deck ว่าง
    clearTimer();
    playSound('click');
    var cat = state.category;
    track('game_started', { mode: 'normal', category: cat });
    setState(Object.assign({}, createInitialGameState(), { category: cat, mode: 'normal', screen: 'question', qEnter: false, deck: buildDeck() }));
    setTimeout(function () { setState({ qEnter: true }); }, 30);
    startTimer();
  }

  function startDaily() {
    if (!allQuestions().length) return;
    clearTimer();
    playSound('click');
    var rng = makeRng('daily-' + dateStr()); // seed = วันที่ → ทุกคนได้ชุดเดียวกัน
    track('game_started', { mode: 'daily' });
    setState(Object.assign({}, createInitialGameState(), { mode: 'daily', screen: 'question', qEnter: false, deck: buildDeck(rng) }));
    setTimeout(function () { setState({ qEnter: true }); }, 30);
    startTimer();
  }

  // ท้าเพื่อน: seed → เด็คเดียวกันทุกเครื่อง; target = คะแนนที่ต้องเอาชนะ (null = ผู้สร้างคำท้า)
  function startChallenge(seed, target, by) {
    if (!allQuestions().length) return;
    seed = seed || Math.random().toString(36).slice(2, 8);
    clearTimer();
    playSound('click');
    var rng = makeRng('ch-' + seed);
    var isAccept = (typeof target === 'number' && !isNaN(target));
    track('game_started', { mode: 'challenge', role: isAccept ? 'accept' : 'create' });
    setState(Object.assign({}, createInitialGameState(), {
      mode: 'challenge', screen: 'question', qEnter: false, deck: buildDeck(rng),
      challengeSeed: seed,
      challengeTarget: isAccept ? target : null,
      challengeBy: by || '',
    }));
    setTimeout(function () { setState({ qEnter: true }); }, 30);
    startTimer();
  }

  function acceptChallenge() {
    if (!pendingChallenge) return;
    var c = pendingChallenge;
    pendingChallenge = null;
    try { history.replaceState(null, '', location.origin + location.pathname); } catch (e) {}
    startChallenge(c.seed, c.target, c.by);
  }

  function buildChallengeUrl(seed, score, by) {
    var u = location.origin + location.pathname + '?ch=' + encodeURIComponent(seed) + '&s=' + score;
    if (by) u += '&by=' + encodeURIComponent(by);
    return u;
  }

  function shareChallenge() {
    var input = document.getElementById('player-name');
    var name = input ? input.value.trim().slice(0, 20) : '';
    var store = loadStore();
    if (name) { store.name = name; saveStore(store); }
    var url = buildChallengeUrl(state.challengeSeed, state.score, name);
    track('shared', { type: 'challenge', channel: navigator.share ? 'native' : 'clipboard' });
    var text = (name || 'ฉัน') + ' ท้าคุณ! ทำคะแนนให้ชนะ ' + state.score + ' คะแนน ในเกม Trivia จับเวลา 🥊\n' + url;
    if (navigator.share) {
      navigator.share({ title: 'Trivia จับเวลา', text: text, url: url }).catch(function () {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function () { showToast('คัดลอกลิงก์คำท้าแล้ว! 🥊'); }).catch(function () {});
    } else {
      showToast(url);
    }
  }

  // แชร์เข้า LINE โดยตรง — LINE จะ unfurl ลิงก์เป็น preview การ์ด (จาก OG tags) พร้อมข้อความคะแนน
  function shareLine() {
    var url, text;
    if (state.mode === 'challenge') {
      var input = document.getElementById('player-name');
      var name = input ? input.value.trim().slice(0, 20) : '';
      if (name) { var s = loadStore(); s.name = name; saveStore(s); }
      url = buildChallengeUrl(state.challengeSeed, state.score, name);
      text = (name || 'ฉัน') + ' ท้าคุณ! ทำคะแนนให้ชนะ ' + state.score + ' คะแนน ในเกม Trivia จับเวลา 🥊';
    } else {
      url = location.origin + location.pathname;
      text = 'ฉันได้ ' + state.score + ' คะแนน ในเกม Trivia จับเวลา! มาลองกัน 🎉';
    }
    track('shared', { type: state.mode === 'challenge' ? 'challenge' : 'score', channel: 'line' });
    window.open('https://line.me/R/msg/text/?' + encodeURIComponent(text + '\n' + url), '_blank');
  }

  function selectCategory(catId) {
    var cat = CATEGORIES.filter(function (c) { return c.id === catId; })[0];
    if (!cat || cat.locked) return;
    setState({ category: catId });
  }

  function handleAnswer(optionIndex) {
    if (state.locked) return;
    clearTimer();
    var q = state.deck[state.qIndex];
    var isCorrect = optionIndex !== null && optionIndex === q.correct;
    var gained = isCorrect ? computeScore(state.timeLeft) : 0;
    var timeSpentMs = TIME_PER_Q - state.timeLeft;
    playSound(isCorrect ? 'correct' : 'wrong');
    setState(function (s) {
      return {
        locked: true,
        selected: optionIndex,
        lastGained: gained,
        score: s.score + gained,
        correctCount: s.correctCount + (isCorrect ? 1 : 0),
        answers: s.answers.concat([{ qIndex: s.qIndex, selected: optionIndex, correct: isCorrect, timeMs: timeSpentMs }]),
      };
    });
    advanceTimeout = setTimeout(nextQuestion, 1500);
  }

  // บันทึกผล daily + อัปเดต streak (นับครั้งเดียวต่อวัน) คืนค่า streak ปัจจุบัน
  function recordDaily() {
    var store = loadStore();
    var today = dateStr();
    if (store.daily && store.daily.lastCompletedDate === today) {
      return store.streak || { current: 0, best: 0 }; // ทำ daily ของวันนี้ไปแล้ว — เล่นซ้ำได้แต่ไม่นับเพิ่ม
    }
    var st = store.streak || { current: 0, best: 0, lastDate: null };
    if (st.lastDate === prevDateStr()) st.current += 1;
    else st.current = 1; // ขาดวัน (หรือครั้งแรก) → เริ่มนับใหม่
    st.lastDate = today;
    st.best = Math.max(st.best || 0, st.current);
    store.streak = st;
    store.daily = { lastCompletedDate: today, lastScore: state.score, lastCorrect: state.correctCount };
    saveStore(store);
    return st;
  }

  // บันทึกสถิติสะสมทุกโหมด (ต้องเรียกหลัง recordDaily เพื่อไม่ทับกัน)
  function recordGame(ctx) {
    var store = loadStore();
    var st = store.stats || { gamesPlayed: 0, totalCorrect: 0, totalQuestions: 0, bestScore: 0 };
    st.gamesPlayed = (st.gamesPlayed || 0) + 1;
    st.totalCorrect = (st.totalCorrect || 0) + ctx.correct;
    st.totalQuestions = (st.totalQuestions || 0) + ctx.total;
    st.bestScore = Math.max(st.bestScore || 0, ctx.score);
    store.stats = st;
    saveStore(store);
  }

  // ตรวจเหรียญที่เพิ่งปลดล็อก (อ่าน store ล่าสุดหลัง recordDaily+recordGame) คืน array ของ def ที่เพิ่งได้
  function checkAchievements(ctx) {
    var store = loadStore();
    var owned = store.achievements || {};
    var newly = [];
    ACHIEVEMENTS.forEach(function (def) {
      if (!owned[def.id] && def.check(store, ctx)) {
        owned[def.id] = { at: dateStr() };
        newly.push(def);
      }
    });
    if (newly.length) {
      store.achievements = owned;
      saveStore(store);
      newly.forEach(function (def) { track('achievement_unlocked', { id: def.id }); });
    }
    return newly;
  }

  function nextQuestion() {
    var isLast = state.qIndex >= state.deck.length - 1;
    if (isLast) {
      playSound('win');
      var patch = { screen: 'summary' };
      if (state.mode === 'daily') patch.dailyStreak = recordDaily().current;
      var avgSec = state.answers.length ? +(state.answers.reduce(function (a, b) { return a + b.timeMs; }, 0) / state.answers.length / 1000).toFixed(1) : 0;
      track('game_finished', { mode: state.mode, category: state.mode === 'normal' ? state.category : state.mode, score: state.score, correct: state.correctCount, total: state.deck.length, avg_time: avgSec });
      if (state.mode === 'daily') track('daily_completed', { streak: patch.dailyStreak, score: state.score });
      if (state.mode === 'challenge' && state.challengeTarget != null) {
        track('challenge_result', { won: state.score > state.challengeTarget, tie: state.score === state.challengeTarget, target: state.challengeTarget, score: state.score });
      }
      // บันทึกสถิติ + ตรวจเหรียญ (ลำดับสำคัญ: recordDaily ด้านบน → recordGame → checkAchievements)
      var ctx = { mode: state.mode, score: state.score, correct: state.correctCount, total: state.deck.length, avgSec: avgSec };
      recordGame(ctx);
      patch.newAchievements = checkAchievements(ctx);
      setState(patch);
    } else {
      setState(function (s) {
        return { qIndex: s.qIndex + 1, selected: null, locked: false, timeLeft: TIME_PER_Q, lastGained: null, qEnter: false };
      });
      setTimeout(function () { setState({ qEnter: true }); }, 30);
      startTimer();
    }
  }

  function restart() {
    clearTimer();
    setState(createInitialGameState());
  }

  function toggleReview() {
    setState(function (s) { return { reviewOpen: !s.reviewOpen }; });
  }

  function showLeaderboard() {
    track('leaderboard_viewed', {});
    setState({ screen: 'leaderboard', lbLoading: true, lbError: '', lbEntries: [] });
    Leaderboard.top(20)
      .then(function (list) { setState({ lbLoading: false, lbEntries: list || [] }); })
      .catch(function () { setState({ lbLoading: false, lbError: 'โหลดกระดานไม่สำเร็จ' }); });
  }

  function submitScore() {
    if (state.lbSubmitted || state.lbSubmitting) return;
    var input = document.getElementById('player-name');
    var name = (input ? input.value.trim().slice(0, 20) : '') || (loadStore().name || '');
    if (!name) { showToast('ใส่ชื่อก่อนนะ 🙂'); return; }
    var s = loadStore(); s.name = name; saveStore(s);
    setState({ lbSubmitting: true });
    Leaderboard.submit({ name: name, score: state.score, mode: state.mode, category: state.mode === 'normal' ? state.category : state.mode })
      .then(function () { setState({ lbSubmitted: true, lbSubmitting: false }); track('score_submitted', { mode: state.mode, score: state.score }); showToast('ส่งขึ้นกระดานแล้ว! 🏆'); })
      .catch(function () { setState({ lbSubmitting: false }); showToast('ส่งไม่สำเร็จ ลองใหม่'); });
  }

  function shareScore() {
    var text;
    if (state.mode === 'daily') {
      text = 'ชาเลนจ์ประจำวัน ' + dateStr() + ' ฉันได้ ' + state.score + ' คะแนน ตอบถูก ' + state.correctCount + '/' + state.deck.length + ' ข้อ'
        + (state.dailyStreak ? ' 🔥 สตรีค ' + state.dailyStreak + ' วัน' : '') + ' ในเกม Trivia จับเวลา!';
    } else {
      text = 'ฉันได้ ' + state.score + ' คะแนน ตอบถูก ' + state.correctCount + '/' + state.deck.length + ' ข้อ ในเกม Trivia จับเวลา! 🎉';
    }
    track('shared', { type: 'score', mode: state.mode, channel: navigator.share ? 'native' : 'clipboard' });
    if (navigator.share) {
      navigator.share({ title: 'Timed Trivia', text: text }).catch(function () {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function () { showToast('คัดลอกคะแนนแล้ว! 📋'); }).catch(function () {});
    }
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function renderStart() {
    var store = loadStore();
    var streak = store.streak || { current: 0, best: 0 };
    var dailyDoneToday = !!(store.daily && store.daily.lastCompletedDate === dateStr());
    var achUnlocked = Object.keys(store.achievements || {}).length;

    var streakHtml = streak.current > 0
      ? '<div style="display:flex;justify-content:center;margin-top:8px">' +
          '<div class="heading" style="background:#fff;border-radius:999px;padding:6px 16px;font-weight:600;font-size:clamp(12.5px,3.2vw,14px);color:#ff7a00;box-shadow:0 4px 0 rgba(0,0,0,.05)">' +
            '🔥 สตรีค ' + streak.current + ' วัน' + (streak.best > streak.current ? ' · สูงสุด ' + streak.best : '') +
          '</div>' +
        '</div>'
      : '';

    var dailyLabel = dailyDoneToday ? '✓ เล่นแล้ววันนี้ 📅' : 'ชาเลนจ์ประจำวัน 📅';

    var challengeBannerHtml = pendingChallenge
      ? '<div style="background:linear-gradient(135deg,#fff0f6,#ffe1ef);border:2px solid #ff8bc4;border-radius:20px;padding:clamp(14px,3.6vw,18px);text-align:center;box-shadow:0 6px 0 rgba(214,64,143,.12)">' +
          '<div class="heading" style="font-size:clamp(15px,4vw,18px);color:#d6408f">⚔️ ' + esc(pendingChallenge.by || 'เพื่อนของคุณ') + ' ท้าคุณ!</div>' +
          (pendingChallenge.target != null ? '<div style="font-size:clamp(12.5px,3.2vw,14px);color:#8b5cf6;margin-top:4px">ทำคะแนนให้เกิน ' + pendingChallenge.target + ' คะแนน</div>' : '') +
          '<div class="start-btn clickable btn-primary" data-action="accept-challenge" style="margin-top:12px">รับคำท้า 🥊</div>' +
        '</div>'
      : '';

    var catsHtml = CATEGORIES.map(function (c) {
      var isSelected = c.id === state.category;
      var border = isSelected ? '2px solid #d6408f' : '2px solid transparent';
      var opacity = c.locked ? 0.5 : 1;
      var badge = c.locked ? '<div class="cat-badge">เร็วๆนี้</div>' : '';
      return (
        '<div class="cat-card clickable" data-action="select-category" data-cat="' + c.id + '" ' +
        'style="opacity:' + opacity + ';border:' + border + '">' +
        '<div style="font-size:clamp(24px,6vw,30px)">' + c.icon + '</div>' +
        '<div class="heading" style="font-weight:600;font-size:clamp(12.5px,3.2vw,14px);margin-top:6px;color:#3d2c52">' + esc(c.name) + '</div>' +
        badge +
        '</div>'
      );
    }).join('');

    return (
      '<div style="display:flex;flex-direction:column;gap:clamp(14px,3.5vw,20px)">' +
        '<div style="text-align:center;padding-top:clamp(4px,2vw,12px)">' +
          '<div style="font-size:clamp(38px,10vw,52px);line-height:1">🎉</div>' +
          '<div class="heading" style="font-size:clamp(26px,7vw,34px);color:#d6408f;margin-top:8px">Trivia จับเวลา</div>' +
          '<div style="font-size:clamp(13px,3.4vw,15px);color:#6b5c7f;margin-top:6px">ตอบให้ไว ได้คะแนนเยอะ!</div>' +
          streakHtml +
        '</div>' +
        challengeBannerHtml +
        '<div class="heading" style="font-weight:600;font-size:clamp(13px,3.4vw,15px);color:#6b5c7f">เลือกหมวดหมู่</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,2.6vw,14px)">' + catsHtml + '</div>' +
        '<div class="start-btn clickable btn-primary" data-action="start">เริ่มเกม 🚀</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,2.6vw,14px)">' +
          '<div class="action-btn clickable btn-primary" data-action="start-daily" style="color:#ff7a00;font-weight:700">' + dailyLabel + '</div>' +
          '<div class="action-btn clickable btn-primary" data-action="start-challenge" style="color:#d6408f;font-weight:700">ท้าเพื่อน 🥊</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,2.6vw,14px)">' +
          '<div class="action-btn clickable btn-primary" data-action="show-leaderboard" style="color:#f59e0b;font-weight:700">อันดับ 🏆</div>' +
          '<div class="action-btn clickable btn-primary" data-action="show-achievements" style="color:#c07a00;font-weight:700">ความสำเร็จ 🏅 ' + achUnlocked + '/' + ACHIEVEMENTS.length + '</div>' +
        '</div>' +
        '<div class="action-btn clickable btn-primary" data-action="show-profile" style="color:#8b5cf6;font-weight:700">โปรไฟล์ 👤</div>' +
      '</div>'
    );
  }

  function renderQuestion() {
    var total = state.deck.length;
    var qi = Math.min(state.qIndex, total - 1);
    var q = state.deck[qi];
    var dashOffset = RING_C * (1 - state.timeLeft / TIME_PER_Q);
    var timeLeftSec = Math.ceil(state.timeLeft / 1000);
    var urgent = state.screen === 'question' && !state.locked && timeLeftSec <= 3;
    var urgentAnim = urgent ? 'urgentPulse 0.6s ease-in-out infinite' : 'none';

    var optsHtml = q.options.map(function (text, i) {
      var st = 'idle';
      if (state.locked) {
        if (i === q.correct) st = 'correct';
        else if (i === state.selected) st = 'wrong';
        else st = 'dim';
      } else if (state.selected === i) {
        st = 'selected';
      }
      var bg = PALETTE.idleBg, txt = PALETTE.idleText;
      if (st === 'correct') { bg = PALETTE.correctBg; txt = PALETTE.correctText; }
      else if (st === 'wrong') { bg = PALETTE.wrongBg; txt = PALETTE.wrongText; }
      else if (st === 'dim') { bg = PALETTE.dimBg; txt = PALETTE.dimText; }
      else if (st === 'selected') { bg = PALETTE.selectedBg; txt = PALETTE.selectedText; }
      return (
        '<div class="opt-card clickable" data-action="answer" data-index="' + i + '" ' +
        'style="background:' + bg + ';color:' + txt + '">' + esc(text) + '</div>'
      );
    }).join('');

    var qEnterOpacity = state.qEnter ? 1 : 0;
    var qEnterTransform = state.qEnter ? 'translateY(0px)' : 'translateY(14px)';

    var isTimeout = state.locked && state.selected === null;
    var isAnswerCorrect = state.locked && state.selected !== null && q.correct === state.selected;
    var bannerBg = isAnswerCorrect ? PALETTE.correctBg : PALETTE.wrongBg;
    var bannerText = isAnswerCorrect ? PALETTE.correctText : PALETTE.wrongText;
    var bannerLabel = isTimeout ? ('⏰ หมดเวลา! เฉลย: ' + q.options[q.correct])
      : isAnswerCorrect ? ('🎉 ถูกต้อง! +' + state.lastGained + ' คะแนน')
      : ('❌ ยังไม่ถูก เฉลยคือ ' + q.options[q.correct]);

    var feedbackHtml = state.locked
      ? ('<div style="display:flex;justify-content:center;pointer-events:none">' +
          '<div class="banner" style="background:' + bannerBg + ';color:' + bannerText + '">' + esc(bannerLabel) + '</div>' +
        '</div>')
      : '';

    return (
      '<div style="display:flex;flex-direction:column;gap:clamp(12px,3vw,18px)">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<div class="heading" style="font-weight:600;font-size:clamp(13px,3.2vw,15px);color:#6b5c7f">ข้อ ' + (qi + 1) + '/' + total + '</div>' +
          '<div class="heading" style="font-size:clamp(15px,3.6vw,17px);color:#d6408f">⭐ ' + state.score + '</div>' +
        '</div>' +
        '<div style="display:flex;justify-content:center">' +
          '<div style="position:relative;width:min(120px,32vw);height:min(120px,32vw)">' +
            '<svg viewBox="0 0 100 100" style="width:100%;height:100%;transform:rotate(-90deg)">' +
              '<circle cx="50" cy="50" r="42" fill="none" stroke="#f3e8ff" stroke-width="9"></circle>' +
              '<circle id="timer-ring" cx="50" cy="50" r="42" fill="none" stroke="#ff5da2" stroke-width="9" stroke-linecap="round" ' +
                'stroke-dasharray="' + RING_C + '" stroke-dashoffset="' + dashOffset + '"></circle>' +
            '</svg>' +
            '<div id="timer-num" class="heading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(26px,7vw,32px);color:#d6408f;animation:' + urgentAnim + '">' + timeLeftSec + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="q-card" style="opacity:' + qEnterOpacity + ';transform:' + qEnterTransform + '">' + esc(q.text) + '</div>' +
        '<div class="opt-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,2.6vw,14px);opacity:' + qEnterOpacity + ';transform:' + qEnterTransform + '">' + optsHtml + '</div>' +
        feedbackHtml +
      '</div>'
    );
  }

  function renderSummary() {
    var total = state.deck.length;
    var answeredCount = state.answers.length;
    var avgTimeSec = answeredCount ? (state.answers.reduce(function (a, b) { return a + b.timeMs; }, 0) / answeredCount / 1000) : 0;

    var reviewHtml = '';
    if (state.reviewOpen) {
      var itemsHtml = state.answers.map(function (a) {
        var qq = state.deck[a.qIndex];
        var yourAnswer = a.selected !== null ? qq.options[a.selected] : 'ไม่ได้ตอบ (หมดเวลา)';
        var icon = a.correct ? '✅' : '❌';
        return (
          '<div class="review-item">' +
            '<div style="font-weight:600;margin-bottom:3px">' + icon + ' ' + (a.qIndex + 1) + '. ' + esc(qq.text) + '</div>' +
            '<div style="color:#8b7a9e">คำตอบของคุณ: ' + esc(yourAnswer) + '</div>' +
            '<div style="color:#22c55e">คำตอบที่ถูก: ' + esc(qq.options[qq.correct]) + '</div>' +
          '</div>'
        );
      }).join('');
      reviewHtml = '<div style="display:flex;flex-direction:column;gap:8px;margin-top:2px;animation:slideUpFade .3s ease">' + itemsHtml + '</div>';
    }

    var isDaily = state.mode === 'daily';
    var isChallenge = state.mode === 'challenge';
    var headTitle = isChallenge ? 'คำท้า! 🥊' : isDaily ? 'ชาเลนจ์ประจำวัน 🗓️' : 'สรุปผล!';

    // การ์ดฉลองเหรียญที่เพิ่งปลดล็อกในเกมนี้
    var newAchHtml = '';
    if (state.newAchievements && state.newAchievements.length) {
      var achItems = state.newAchievements.map(function (a) {
        return '<div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.7);border-radius:14px;padding:8px 12px">' +
            '<div style="font-size:clamp(24px,6vw,30px)">' + a.icon + '</div>' +
            '<div style="text-align:left"><div class="heading" style="font-weight:600;font-size:clamp(13px,3.4vw,15px);color:#8a5a00">' + esc(a.name) + '</div>' +
            '<div style="font-size:clamp(10.5px,2.7vw,12px);color:#b06a1e">' + esc(a.desc) + '</div></div>' +
          '</div>';
      }).join('');
      newAchHtml =
        '<div style="border-radius:20px;padding:clamp(12px,3.2vw,16px);background:linear-gradient(135deg,#fff7db,#ffe9a8);box-shadow:0 6px 0 rgba(0,0,0,.05);animation:bounceIn .5s ease">' +
          '<div class="heading" style="text-align:center;font-size:clamp(14px,3.8vw,17px);color:#c07a00;margin-bottom:8px">🎉 ปลดล็อกความสำเร็จใหม่!</div>' +
          '<div style="display:flex;flex-direction:column;gap:8px">' + achItems + '</div>' +
        '</div>';
    }
    var streakCardHtml = isDaily && state.dailyStreak
      ? '<div class="summary-stat" style="background:linear-gradient(135deg,#fff4e6,#ffe8cc)">' +
          '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#ff7a00">🔥 ' + state.dailyStreak + ' วัน</div>' +
          '<div style="font-size:clamp(11px,2.8vw,12px);color:#b06a1e">สตรีคต่อเนื่อง</div>' +
        '</div>'
      : '';

    // ผลการท้า (เฉพาะผู้รับคำท้าที่มี target)
    var challengeResultHtml = '';
    if (isChallenge && state.challengeTarget != null) {
      var won = state.score > state.challengeTarget;
      var tie = state.score === state.challengeTarget;
      var label = won ? '🎉 คุณชนะ!' : tie ? '🤝 เสมอ!' : '😤 ยังแพ้ ลองใหม่!';
      var bg = won ? 'linear-gradient(135deg,#d1fae5,#a7f3d0)' : tie ? 'linear-gradient(135deg,#f4f1fa,#e9e3f5)' : 'linear-gradient(135deg,#ffe4e6,#fecdd3)';
      var col = won ? '#059669' : tie ? '#6b5c7f' : '#e11d48';
      challengeResultHtml =
        '<div style="border-radius:20px;padding:clamp(14px,3.6vw,18px);text-align:center;background:' + bg + ';box-shadow:0 6px 0 rgba(0,0,0,.05)">' +
          '<div class="heading" style="font-size:clamp(18px,4.8vw,22px);color:' + col + '">' + label + '</div>' +
          '<div style="font-size:clamp(12px,3.2vw,13.5px);color:#6b5c7f;margin-top:4px">🎯 ต้องเอาชนะ ' + state.challengeTarget + ' · คุณได้ ' + state.score + '</div>' +
        '</div>';
    }

    // บล็อกปุ่มล่าง: ช่องใส่ชื่อ (ใช้ร่วมทั้งส่งคะแนน+แชร์คำท้า) + ส่งขึ้นกระดาน + แชร์ + ดูเฉลย
    var savedName = (loadStore().name || '');
    var submitLabel = state.lbSubmitted ? '✓ ส่งขึ้นกระดานแล้ว' : state.lbSubmitting ? 'กำลังส่ง…' : 'ส่งขึ้นกระดาน 🏆';
    var submitStyle = state.lbSubmitted ? 'color:#9aa5b8' : 'color:#f59e0b;font-weight:700';
    var restartBtn = '<div class="restart-btn clickable btn-primary" data-action="restart">' + (isChallenge ? 'เล่นเกมอื่น 🏠' : 'เล่นอีกครั้ง 🔁') + '</div>';
    var nameInputHtml = '<input id="player-name" class="name-input" type="text" maxlength="20" placeholder="ใส่ชื่อคุณ (ไม่บังคับ)" value="' + esc(savedName) + '">';
    var submitBtn = '<div class="action-btn clickable btn-primary" data-action="submit-score" style="' + submitStyle + '">' + submitLabel + '</div>';
    var shareBtn = isChallenge
      ? '<div class="action-btn clickable btn-primary" data-action="share-challenge" style="color:#d6408f;font-weight:700">แชร์คำท้า 🥊</div>'
      : '<div class="action-btn clickable btn-primary" data-action="share" style="color:#8b5cf6">แชร์คะแนน 📤</div>';
    var reviewBtn = '<div class="action-btn clickable btn-primary" data-action="toggle-review" style="color:#2dd4bf">ดูเฉลย 📋</div>';
    var lineBtn = '<div class="action-btn clickable btn-primary" data-action="share-line" style="color:#06c755;font-weight:700">แชร์เข้า LINE 💬</div>';
    var actionsHtml = restartBtn + nameInputHtml +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' + submitBtn + shareBtn + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' + lineBtn + reviewBtn + '</div>';

    return (
      '<div style="display:flex;flex-direction:column;gap:clamp(10px,2.6vw,14px)">' +
        '<div style="text-align:center;padding-top:4px;animation:bounceIn .5s ease">' +
          '<div style="font-size:clamp(40px,10vw,52px)">🏆</div>' +
          '<div class="heading" style="font-size:clamp(20px,5vw,24px);color:#d6408f;margin-top:4px">' + headTitle + '</div>' +
        '</div>' +
        newAchHtml +
        streakCardHtml +
        challengeResultHtml +
        '<div class="summary-score">' +
          '<div class="heading" style="font-size:clamp(34px,9vw,44px);color:#ff5da2">' + state.score + '</div>' +
          '<div style="font-size:clamp(12px,3vw,13px);color:#8b7a9e;margin-top:2px">คะแนนรวม</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,2.6vw,14px)">' +
          '<div class="summary-stat">' +
            '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#3d2c52">' + state.correctCount + '/' + total + '</div>' +
            '<div style="font-size:clamp(11px,2.8vw,12px);color:#8b7a9e">ตอบถูก</div>' +
          '</div>' +
          '<div class="summary-stat">' +
            '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#3d2c52">' + avgTimeSec.toFixed(1) + 's</div>' +
            '<div style="font-size:clamp(11px,2.8vw,12px);color:#8b7a9e">เฉลี่ย/ข้อ</div>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:10px;margin-top:2px">' +
          actionsHtml +
        '</div>' +
        reviewHtml +
      '</div>'
    );
  }

  function renderLeaderboard() {
    var listHtml;
    if (state.lbLoading) {
      listHtml = '<div style="text-align:center;color:#8b7a9e;padding:24px 0;font-family:\'Mitr\',sans-serif">กำลังโหลด…</div>';
    } else if (state.lbError) {
      listHtml = '<div style="text-align:center;color:#e11d48;padding:16px 0">' + esc(state.lbError) + '</div>' +
        '<div class="action-btn clickable btn-primary" data-action="show-leaderboard" style="color:#f59e0b;font-weight:700">ลองใหม่ 🔄</div>';
    } else if (!state.lbEntries.length) {
      listHtml = '<div style="text-align:center;color:#8b7a9e;padding:24px 0">ยังไม่มีคะแนน มาเป็นคนแรกกันเถอะ! 🎯</div>';
    } else {
      listHtml = state.lbEntries.map(function (e, i) {
        var rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.';
        return '<div class="review-item" style="display:flex;align-items:center;gap:10px">' +
            '<div class="heading" style="min-width:28px;text-align:center;font-size:clamp(14px,3.8vw,17px);color:#d6408f">' + rank + '</div>' +
            '<div style="flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(e.name || '—') + '</div>' +
            '<div class="heading" style="color:#ff5da2;font-size:clamp(14px,3.8vw,17px)">' + e.score + '</div>' +
          '</div>';
      }).join('');
    }

    var testBadge = Leaderboard.mode === 'local'
      ? '<div style="text-align:center;font-size:clamp(11px,2.8vw,12px);color:#8b7a9e;background:#fff;border-radius:12px;padding:8px 12px;box-shadow:0 4px 0 rgba(0,0,0,.04)">🧪 โหมดทดลอง — คะแนนเก็บในเครื่องนี้ (ดู LEADERBOARD-SETUP.md เพื่อต่อ Supabase)</div>'
      : '';

    return (
      '<div style="display:flex;flex-direction:column;gap:clamp(10px,2.6vw,14px)">' +
        '<div style="text-align:center;padding-top:4px">' +
          '<div style="font-size:clamp(40px,10vw,52px)">🏆</div>' +
          '<div class="heading" style="font-size:clamp(20px,5vw,24px);color:#d6408f;margin-top:4px">อันดับคะแนนสูงสุด</div>' +
        '</div>' +
        testBadge +
        '<div style="display:flex;flex-direction:column;gap:8px">' + listHtml + '</div>' +
        '<div class="restart-btn clickable btn-primary" data-action="restart">← กลับ</div>' +
      '</div>'
    );
  }

  function renderAchievements() {
    var owned = loadStore().achievements || {};
    var unlockedCount = ACHIEVEMENTS.filter(function (a) { return owned[a.id]; }).length;

    var cardsHtml = ACHIEVEMENTS.map(function (a) {
      var got = !!owned[a.id];
      var bg = got ? 'linear-gradient(135deg,#fff7db,#ffe9a8)' : '#f4f1fa';
      var opacity = got ? 1 : 0.6;
      var icon = got ? a.icon : '🔒';
      var sub = got ? ('ปลดล็อก ' + owned[a.id].at) : a.desc;
      var subColor = got ? '#b06a1e' : '#9aa5b8';
      var nameColor = got ? '#8a5a00' : '#8b7a9e';
      return '<div style="display:flex;align-items:center;gap:12px;background:' + bg + ';border-radius:16px;padding:clamp(10px,2.6vw,14px);opacity:' + opacity + ';box-shadow:0 4px 0 rgba(0,0,0,.04)">' +
          '<div style="font-size:clamp(26px,6.5vw,32px);min-width:40px;text-align:center">' + icon + '</div>' +
          '<div style="flex:1;min-width:0">' +
            '<div class="heading" style="font-weight:600;font-size:clamp(13.5px,3.5vw,15px);color:' + nameColor + '">' + esc(a.name) + '</div>' +
            '<div style="font-size:clamp(11px,2.9vw,12.5px);color:' + subColor + ';margin-top:2px">' + esc(sub) + '</div>' +
          '</div>' +
        '</div>';
    }).join('');

    return (
      '<div style="display:flex;flex-direction:column;gap:clamp(10px,2.6vw,14px)">' +
        '<div style="text-align:center;padding-top:4px">' +
          '<div style="font-size:clamp(40px,10vw,52px)">🏅</div>' +
          '<div class="heading" style="font-size:clamp(20px,5vw,24px);color:#d6408f;margin-top:4px">ความสำเร็จ</div>' +
          '<div style="font-size:clamp(12.5px,3.2vw,14px);color:#6b5c7f;margin-top:4px">ปลดล็อกแล้ว ' + unlockedCount + '/' + ACHIEVEMENTS.length + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;gap:10px">' + cardsHtml + '</div>' +
        '<div class="restart-btn clickable btn-primary" data-action="restart">← กลับ</div>' +
      '</div>'
    );
  }

  function renderProfile() {
    var store = loadStore();
    var st = store.stats || { gamesPlayed: 0, totalCorrect: 0, totalQuestions: 0, bestScore: 0 };
    var streak = store.streak || { current: 0, best: 0 };
    var owned = store.achievements || {};
    var unlockedCount = ACHIEVEMENTS.filter(function (a) { return owned[a.id]; }).length;
    // Math.min กันเปอร์เซ็นต์เกิน 100 กรณี store เก่าก่อนมี totalQuestions (totalCorrect สะสมมาก่อนหน้านั้นแล้ว)
    var accuracyLabel = st.totalQuestions > 0
      ? Math.min(100, Math.round((st.totalCorrect / st.totalQuestions) * 100)) + '%'
      : '—';

    var streakCardHtml = (streak.current > 0 || streak.best > 0)
      ? '<div class="summary-stat" style="background:linear-gradient(135deg,#fff4e6,#ffe8cc)">' +
          '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#ff7a00">🔥 ' + streak.current + ' วัน</div>' +
          '<div style="font-size:clamp(11px,2.8vw,12px);color:#b06a1e">สตรีคปัจจุบัน' + (streak.best > streak.current ? ' · สูงสุด ' + streak.best : '') + '</div>' +
        '</div>'
      : '';

    return (
      '<div style="display:flex;flex-direction:column;gap:clamp(10px,2.6vw,14px)">' +
        '<div style="text-align:center;padding-top:4px">' +
          '<div style="font-size:clamp(40px,10vw,52px)">👤</div>' +
          '<div class="heading" style="font-size:clamp(20px,5vw,24px);color:#d6408f;margin-top:4px">โปรไฟล์ของฉัน</div>' +
          (store.name ? '<div style="font-size:clamp(12.5px,3.2vw,14px);color:#6b5c7f;margin-top:4px">' + esc(store.name) + '</div>' : '') +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px,2.6vw,14px)">' +
          '<div class="summary-stat">' +
            '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#3d2c52">' + (st.gamesPlayed || 0) + '</div>' +
            '<div style="font-size:clamp(11px,2.8vw,12px);color:#8b7a9e">เกมที่เล่น</div>' +
          '</div>' +
          '<div class="summary-stat">' +
            '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#3d2c52">' + (st.bestScore || 0) + '</div>' +
            '<div style="font-size:clamp(11px,2.8vw,12px);color:#8b7a9e">คะแนนสูงสุด</div>' +
          '</div>' +
          '<div class="summary-stat">' +
            '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#3d2c52">' + (st.totalCorrect || 0) + '</div>' +
            '<div style="font-size:clamp(11px,2.8vw,12px);color:#8b7a9e">ตอบถูกสะสม</div>' +
          '</div>' +
          '<div class="summary-stat">' +
            '<div class="heading" style="font-size:clamp(18px,4.6vw,22px);color:#3d2c52">' + accuracyLabel + '</div>' +
            '<div style="font-size:clamp(11px,2.8vw,12px);color:#8b7a9e">ความแม่นยำ</div>' +
          '</div>' +
        '</div>' +
        streakCardHtml +
        '<div class="clickable" data-action="show-achievements" style="border-radius:16px;padding:clamp(10px,2.6vw,14px);background:linear-gradient(135deg,#fff7db,#ffe9a8);box-shadow:0 5px 0 rgba(0,0,0,.04);text-align:center">' +
          '<div class="heading" style="font-weight:600;font-size:clamp(13.5px,3.5vw,15px);color:#8a5a00">🏅 ความสำเร็จ ' + unlockedCount + '/' + ACHIEVEMENTS.length + '</div>' +
          '<div style="font-size:clamp(11px,2.8vw,12.5px);color:#b06a1e;margin-top:2px">แตะเพื่อดูทั้งหมด</div>' +
        '</div>' +
        '<div class="restart-btn clickable btn-primary" data-action="restart">← กลับ</div>' +
      '</div>'
    );
  }

  function render() {
    var body = state.screen === 'start' ? renderStart()
      : state.screen === 'question' ? renderQuestion()
      : state.screen === 'leaderboard' ? renderLeaderboard()
      : state.screen === 'achievements' ? renderAchievements()
      : state.screen === 'profile' ? renderProfile()
      : renderSummary();

    var toastHtml = state.toastMsg
      ? '<div class="toast"><div class="toast-inner">' + esc(state.toastMsg) + '</div></div>'
      : '';

    document.getElementById('app').innerHTML =
      '<div class="wrap">' + body + '</div>' + toastHtml;
  }

  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    if (action === 'start') startGame();
    else if (action === 'start-daily') startDaily();
    else if (action === 'start-challenge') startChallenge();
    else if (action === 'accept-challenge') acceptChallenge();
    else if (action === 'select-category') selectCategory(el.getAttribute('data-cat'));
    else if (action === 'answer') handleAnswer(parseInt(el.getAttribute('data-index'), 10));
    else if (action === 'restart') restart();
    else if (action === 'show-leaderboard') showLeaderboard();
    else if (action === 'show-achievements') { track('achievements_viewed', {}); setState({ screen: 'achievements' }); }
    else if (action === 'show-profile') { track('profile_viewed', {}); setState({ screen: 'profile' }); }
    else if (action === 'submit-score') submitScore();
    else if (action === 'share') shareScore();
    else if (action === 'share-challenge') shareChallenge();
    else if (action === 'share-line') shareLine();
    else if (action === 'toggle-review') toggleReview();
  });

  render();

  track('app_opened', { via_challenge: !!pendingChallenge, standalone: !!(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) });

  // ลงทะเบียน service worker (PWA) — path สัมพัทธ์เพื่อรองรับ subpath /QuizDash/ บน GitHub Pages
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function () {});
    });
  }
})();
</script>
</body>
</html>
